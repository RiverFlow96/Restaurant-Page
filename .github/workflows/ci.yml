name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install uv
        run: pip install uv
        
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
        
      - name: Run migrations
        run: uv run python manage.py migrate
        
      - name: Run tests
        run: echo "No tests configured"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        working-directory: frontend
        run: bun install
        
      - name: Build
        working-directory: frontend
        run: bun run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: |
          docker-compose build
          
      - name: Verify containers run
        run: |
          docker-compose up -d
          sleep 5
          docker-compose ps